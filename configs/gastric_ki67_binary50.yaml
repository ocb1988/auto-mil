name: gastric_ki67_binary50
dataset:
  name: Gastric-Ki67
  bag_level: slide
  case_id_column: "HE\u5339\u914d\u73bb\u7247\u540d"
  feature:
    format: pt
    feature_key: features
    coords_key: coords
    case_id_regex: "^(?P<case>.+?)\\.Virchow2\\.pt$"
    feature_glob: "**/features/*.pt"

task:
  kind: classification
  label_column: "Ki-67\u7ed3\u679c(%)"
  label_threshold: 50
  label_threshold_direction: ge
  negative_label: ki67_lt_50
  positive_label: ki67_ge_50
  primary_metric: test_macro_auc
  min_class_count: 2
  split_seed: 2024
  train_size: 0.7
  val_size: 0.15
  test_size: 0.15

paths:
  data_dir: 'I:\Dataset\Ki-67\gastric_Ki67_feat'
  labels_csv: 'I:\Dataset\Ki-67\gastric_Ki67_feat\gastric_ki67_label.csv'
  mil_baseline_dir: third_party\MIL_BASELINE
  output_dir: E:\PyDL\auto-mil\runs\gastric_ki67
  python: D:\ProgramData\Anaconda3\envs\torch2p7cu128\python.exe

training:
  device: 0
  num_workers: 0
  screening_epochs: 1
  focused_epochs: 3
  cv_epochs: 1
  best_metric: macro_auc
  balanced_sampler: false
  cv_balanced_sampler: false
  in_dim: auto

search:
  cv_models:
    - MEAN_MIL
    - MAX_MIL
    - AB_MIL
  screen_models:
    - AB_MIL
  focused_models:
    - AB_MIL
  learning_rates:
    - 0.0002
  dropouts:
    - 0.1
